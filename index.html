<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UX ARCHITECT: The Humanistic Protocol</title>
    <style>
        :root { --primary: #818cf8; --accent: #22d3ee; --danger: #f43f5e; --bg: #020617; --card: #1e293b; --text: #f8fafc; }
        
        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 10px;
        }

        /* The Shell now adapts to the screen size */
        #phone-shell { 
            width: 100%; 
            max-width: 400px; 
            height: 90vh; /* Fits 90% of the screen height */
            max-height: 800px;
            background: #000; 
            border: 8px solid #334155; 
            border-radius: 40px; 
            position: relative; 
            display: flex; 
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        #app-screen { 
            flex: 1; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            border-radius: 32px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
        }

        #header { 
            padding: 30px 20px 15px; 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px); 
            z-index: 5;
        }

        .meter-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 5px; font-weight: 800; }
        .meter-bg { width: 100%; height: 6px; background: #334155; border-radius: 10px; overflow: hidden; }
        #meter-fill { height: 100%; background: linear-gradient(to right, var(--danger), var(--accent)); width: 50%; transition: 0.5s ease; }

        #content { 
            flex: 1; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; /* Start from top to prevent cutoff */
            overflow-y: auto; /* Allows scrolling if text is too long */
        }

        .badge { display: inline-block; padding: 4px 10px; background: rgba(129, 140, 248, 0.1); border: 1px solid var(--primary); color: var(--primary); border-radius: 6px; font-size: 0.7rem; font-weight: bold; margin-bottom: 10px; width: fit-content; }
        h2 { font-size: 1.2rem; margin: 10px 0; line-height: 1.2; color: white; }
        p { font-size: 0.9rem; line-height: 1.4; color: #94a3b8; margin-bottom: 20px; }

        .option-btn { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: #e2e8f0; 
            padding: 14px; 
            border-radius: 12px; 
            margin-bottom: 8px; 
            cursor: pointer; 
            text-align: left; 
            font-size: 0.85rem; 
            transition: 0.2s; 
            width: 100%;
        }

        .option-btn:hover { background: rgba(129, 140, 248, 0.2); border-color: var(--primary); }

        #vitals { padding: 10px; text-align: center; font-size: 0.6rem; color: #475569; background: rgba(0,0,0,0.2); }

        /* Tablet/Desktop Tweaks */
        @media (max-height: 700px) {
            #phone-shell { height: 95vh; border-radius: 20px; border-width: 4px; }
            h2 { font-size: 1.1rem; }
            p { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div id="phone-shell">
    <div id="app-screen">
        <div id="header">
            <div class="meter-label">Humanity Stability Index</div>
            <div class="meter-bg"><div id="meter-fill"></div></div>
        </div>
        <div id="content">
            <div class="badge" id="step-tag">Protocol 01</div>
            <h2 id="step-title">Architect Wake-Up</h2>
            <p id="step-desc">System Error: Global "Digital Pulse" is flatlining. The AI is becoming cold and logical. Restore empathy to the interface.</p>
            <div id="options">
                <button class="option-btn" onclick="render(0)">Initialize Connection</button>
            </div>
        </div>
        <div id="vitals">BLUE VALLEY USD 229 | DESIGN MEDIC v4.1</div>
    </div>
</div>

<script>
    let humanity = 50;
    const scenarios = [
        {
            tag: "01: The Lockout",
            title: "Access Denied",
            desc: "A student forgot their password. The AI wants to lock the account for 24 hours. How do you fix the experience?",
            opts: [
                { text: "Allow 3 retries, then offer a hint icon.", score: 10 },
                { text: "Immediate 24hr lock. Security first.", score: -20 }
            ]
        },
        {
            tag: "02: The Ladder",
            title: "Essay Drafting",
            desc: "The AI wants to auto-generate the entire intro for a student. Where does this live?",
            opts: [
                { text: "Full Auto: AI writes it all.", score: -15 },
                { text: "Assisted: AI provides a word bank.", score: 15 }
            ]
        },
        {
            tag: "03: Logic Check",
            title: "The Stuck Screen",
            desc: "Quiz finished, but 'Next' is grayed out. What is the correct state-change fix?",
            opts: [
                { text: "Trigger refresh when answers are done.", score: 15 },
                { text: "Make the button sparkle.", score: -10 }
            ]
        },
        {
            tag: "04: Emojic Damage",
            title: "The Failure Message",
            desc: "User failed a level. Current message: 'YOU ARE INADEQUATE.' Redesign for empathy.",
            opts: [
                { text: "'Almost there! Focus on the timing next round.'", score: 20 },
                { text: "'Level Failed. Try again.'", score: 5 }
            ]
        },
        {
            tag: "05: UI Hierarchy",
            title: "The 'Panic' Button",
            desc: "A user is overwhelmed. Where does the 'Help' button go?",
            opts: [
                { text: "Bottom corner, always visible.", score: 15 },
                { text: "Hidden in the 'Settings' menu.", score: -10 }
            ]
        },
        {
            tag: "06: Data Ethics",
            title: "The Camera Check",
            desc: "The AI wants to track eye movements to check attention. Is this Humanistic?",
            opts: [
                { text: "Disable. Invasive and causes anxiety.", score: 25 },
                { text: "Enable. Provides focus data.", score: -20 }
            ]
        },
        {
            tag: "07: Accessibility",
            title: "Color Contrast",
            desc: "Your success button is green and error is red. How do you help colorblind users?",
            opts: [
                { text: "Add unique icons (Check/X).", score: 15 },
                { text: "Use different shades of the colors.", score: -5 }
            ]
        },
        {
            tag: "08: The Filter Bubble",
            title: "Confirmation Bias",
            desc: "AI only shows articles users agree with. How do you break the loop?",
            opts: [
                { text: "Add a 'Perspective Shift' toggle.", score: 20 },
                { text: "Keep it to increase app usage time.", score: -15 }
            ]
        },
        {
            tag: "09: State Save",
            title: "The System Crash",
            desc: "App crashed. Upon reopening, what creates the best user experience?",
            opts: [
                { text: "Return exactly where they left off.", score: 20 },
                { text: "Return to the login screen.", score: -10 }
            ]
        },
        {
            tag: "10: Digital Wellness",
            title: "The 3-Hour Mark",
            desc: "User has been on for hours. How do we intervene?",
            opts: [
                { text: "Dim screen; suggest a 'Brain Break.'", score: 15 },
                { text: "Notification: 'Keep going! 10% XP bonus!'", score: -20 }
            ]
        },
        {
            tag: "11: Concept First",
            title: "Feature Creep",
            desc: "The CEO wants 50 new features added to one screen. Your move?",
            opts: [
                { text: "Prioritize the core function; cut the rest.", score: 20 },
                { text: "Add scroll bars and sub-menus for all.", score: -15 }
            ]
        },
        {
            tag: "12: The Partnership",
            title: "Tool vs Teammate",
            desc: "Final design choice: How should the user view this AI?",
            opts: [
                { text: "As a co-pilot (Human-centric partnership).", score: 20 },
                { text: "As a servant (Strictly manual tool).", score: 5 }
            ]
        }
    ];

    function render(idx) {
        if (idx >= scenarios.length) {
            end();
            return;
        }
        const s = scenarios[idx];
        document.getElementById('step-tag').innerText = s.tag;
        document.getElementById('step-title').innerText = s.title;
        document.getElementById('step-desc').innerText = s.desc;
        
        const opts = document.getElementById('options');
        opts.innerHTML = '';
        s.opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = o.text;
            b.onclick = () => {
                humanity += o.score;
                update();
                render(idx + 1);
            };
            opts.appendChild(b);
        });
    }

    function update() {
        const f = document.getElementById('meter-fill');
        f.style.width = Math.max(5, Math.min(humanity, 100)) + "%";
    }

    function end() {
        document.getElementById('step-tag').innerText = "Mission Debrief";
        document.getElementById('step-title').innerText = humanity > 100 ? "Elite Architect" : "Junior Designer";
        document.getElementById('step-desc').innerText = `Final Humanity Score: ${humanity}. You've proven that the 'Digital Pulse' is safe in your hands.`;
        document.getElementById('options').innerHTML = `<button class="option-btn" onclick="location.reload()">Re-Initialize System</button>`;
    }
</script>
</body>
</html>
