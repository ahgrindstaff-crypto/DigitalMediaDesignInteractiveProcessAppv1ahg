<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UX ARCHITECT: Final Protocol</title>
    <style>
        :root { --primary: #6366f1; --accent: #22d3ee; --bg: #020617; --card: #1e293b; --text: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        #app-shell { width: 100%; max-width: 420px; height: 92vh; max-height: 800px; background: #000; border: 4px solid #334155; border-radius: 40px; position: relative; display: flex; flex-direction: column; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); overflow: hidden; }
        #app-inner { flex: 1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #header { padding: 45px 20px 20px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); font-weight: 900; }
        #main-content { flex: 1; padding: 25px; display: flex; flex-direction: column; overflow-y: auto; }
        .badge { display: inline-block; padding: 5px 12px; background: rgba(99, 102, 241, 0.1); border: 1px solid var(--primary); color: var(--primary); border-radius: 8px; font-size: 0.7rem; font-weight: bold; margin-bottom: 15px; width: fit-content; text-transform: uppercase; }
        h2 { font-size: 1.35rem; margin: 0 0 15px; line-height: 1.2; color: #fff; }
        p { font-size: 0.95rem; line-height: 1.5; color: #94a3b8; margin-bottom: 30px; }
        .btn-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .choice-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #e2e8f0; padding: 18px; border-radius: 16px; cursor: pointer; text-align: left; font-size: 0.9rem; transition: 0.2s; }
        .choice-btn:hover { background: rgba(99, 102, 241, 0.15); border-color: var(--primary); transform: translateX(4px); }
        #vitals { padding: 12px; text-align: center; font-size: 0.65rem; color: #475569; background: rgba(0,0,0,0.3); font-family: monospace; }
    </style>
</head>
<body>

<div id="app-shell">
    <div id="app-inner">
        <div id="header">
            <div class="header-title">Design Diagnostic Active</div>
        </div>
        <div id="main-content">
            <div id="game-area">
                <div class="badge">Initializing...</div>
                <h2>UX Architect: Protocol 4.5</h2>
                <p>Welcome, Architect. Navigate 22 design hurdles to restore the Digital Pulse. Randomized logic enabled.</p>
                <div class="btn-list">
                    <button class="choice-btn" onclick="startGame()">Begin Simulation</button>
                </div>
            </div>
        </div>
        <div id="vitals">BV-229 // GRINDSTAFF_CLEAN_FLOW</div>
    </div>
</div>

<script>
    let currentIdx = 0;
    const levels = [
        { tag: "Hierarchy", title: "The Ghost State", desc: "A user clicks 'Submit' but the screen stays static. How do you reduce anxiety?", opts: ["Add a high-contrast loading spinner.", "Leave it as is; it will finish eventually."]},
        { tag: "Ethics", title: "The Dark Pattern", desc: "You find a 'Cancel' button hidden in tiny, grey text. Redesign for Humanistic AI.", opts: ["Make it clearly visible and easy to find.", "Keep it hidden to save the company money."]},
        { tag: "Accessibility", title: "The Color Barrier", desc: "A success message is only green. How do you help colorblind users?", opts: ["Add a distinct 'Checkmark' icon.", "Make the green much brighter."]},
        { tag: "Wellness", title: "The Infinite Scroll", desc: "A user has scrolled for 20 minutes straight. What is the Humanistic fix?", opts: ["Introduce a 'Take a Break' nudge.", "Add more exciting content to keep them."]},
        { tag: "Ladder", title: "The Over-Correction", desc: "An AI is auto-cropping photos but cutting off heads. Move this down the Ladder.", opts: ["Assisted: AI suggests a crop, user approves.", "Manual: Remove all AI features."]},
        { tag: "State", title: "The Stuck Screen", desc: "The 'Next' button won't activate even though the task is done. What is the logic fix?", opts: ["Ensure the button state resets to 'Active'.", "Make the button pulsate to look busy."]},
        { tag: "Typography", title: "The Mood Shift", desc: "A 'Crisis Help' app uses a jagged, aggressive font. What font reduces Emojic Damage?", opts: ["A soft, rounded Sans-Serif font.", "A sharp, modern Serif font."]},
        { tag: "Privacy", title: "The Mirror Test", desc: "The AI wants to record the user's face to track 'Happiness.' Is this Humanistic?", opts: ["No. This is invasive and raises stress.", "Yes. It's a cool tech feature."]},
        { tag: "Hierarchy", title: "The Finger Trap", desc: "A button is only 10px wide on a mobile screen. What is the design fix?", opts: ["Increase touch target to at least 44px.", "Tell the user to use a stylus."]},
        { tag: "Feedback", title: "The Soundscape", desc: "A user completes a difficult task. What audio feedback is most Humanistic?", opts: ["A soft, harmonized chime.", "A loud, startling air-horn blast."]},
        { tag: "Transparency", title: "The Logic Gap", desc: "The AI made a mistake. How do you explain it to the user?", opts: ["Provide a 'Why did this happen?' link.", "Hide the error and hope they don't notice."]},
        { tag: "Motion", title: "The Motion Blur", desc: "A transition causes dizziness. What do you do?", opts: ["Add an 'Ease-In-Out' curve to the motion.", "Remove all animations entirely."]},
        { tag: "Ladder", title: "The Trust Gap", desc: "The AI wants to delete duplicate files. How do you design the confirmation?", opts: ["List files and ask for a 'Check-All' click.", "Delete them silently to save space."]},
        { tag: "Concept", title: "The Empty State", desc: "A user's inbox is empty. What design creates a better 'Digital Pulse'?", opts: ["A calm graphic and an 'All caught up!' note.", "A blank white screen."]},
        { tag: "Ethics", title: "The Nudge", desc: "An app sends 10 notifications per hour. How do you reduce Emojic Damage?", opts: ["Group alerts into a single 'Daily Digest'.", "Make the notification sound louder."]},
        { tag: "Interaction", title: "The Breadcrumb", desc: "A user is 5 menus deep and lost. What UI component is missing?", opts: ["A clear navigation trail at the top.", "A 'Home' button hidden in settings."]},
        { tag: "Ladder", title: "The Suggestion", desc: "The AI offers 3 auto-replies for a text. What rung of the ladder is this?", opts: ["Assisted: The human still makes the choice.", "Full Auto: The AI sends the best one."]},
        { tag: "Logic", title: "The False Bottom", desc: "A user thinks the page has ended, but there is more. How do you signal this?", opts: ["Show a 'Peek' of the next content block.", "Add a giant 'SCROLL DOWN' arrow."]},
        { tag: "Humanistic", title: "The Data Audit", desc: "The app collects location data 'just because.' How do you redesign for trust?", opts: ["Only ask for data when a feature needs it.", "Hide it in the Terms of Service."]},
        { tag: "Design", title: "The Feature Creep", desc: "The client wants 20 buttons on the home screen. What do you recommend?", opts: ["Progressive Disclosure: Hide secondary items.", "Shrink all icons to fit on one screen."]},
        { tag: "State", title: "The Crash Landing", desc: "The app crashed. Upon reboot, where is the best state for the user?", opts: ["The exact moment before the crash.", "The Main Menu."]},
        { tag: "Final", title: "Tool vs Teammate", desc: "How should the final UI represent the AI's role in the user's life?", opts: ["As a co-pilot (Human-centric partnership).", "As a servant (Strictly manual tool)."]}
    ];

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function startGame() {
        currentIdx = 0;
        renderLevel();
    }

    function renderLevel() {
        if (currentIdx >= levels.length) {
            endGame();
            return;
        }
        const lvl = levels[currentIdx];
        const shuffledOpts = shuffle([...lvl.opts]);
        const area = document.getElementById('game-area');
        area.innerHTML = `
            <div class="badge">${lvl.tag} [${currentIdx + 1}/22]</div>
            <h2>${lvl.title}</h2>
            <p>${lvl.desc}</p>
            <div class="btn-list">
                ${shuffledOpts.map((o) => `<button class="choice-btn" onclick="nextLevel()">${o}</button>`).join('')}
            </div>
        `;
    }

    function nextLevel() {
        currentIdx++;
        renderLevel();
    }

    function endGame() {
        const area = document.getElementById('game-area');
        area.innerHTML = `
            <div class="badge">Simulation Complete</div>
            <h2>Final Review</h2>
            <p>You have successfully navigated all 22 hurdles. Your design architectural review is finished.</p>
            <div class="btn-list">
                <button class="choice-btn" onclick="startGame()">Re-Run Simulation</button>
            </div>
        `;
    }
</script>
</body>
</html>
